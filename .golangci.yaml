version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true

issues:
  exclude-dirs:
    - internal/challenges/basics
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
